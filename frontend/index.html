<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f7942" />

    <title>Ludwig Chess</title>
    <meta
      name="description"
      content="Standard online chess with a live Stockfish evaluation bar that runs in your browser. Free, no signup, play a friend by sharing a code."
    />

    <!-- Icons. Note: the raster icons + og.png are still placeholder art; regen for
         Ludwig branding is tracked for the deploy slice. -->
    <link rel="icon" href="/favicon-48.png" sizes="48x48" type="image/png" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph / social cards. Absolute URLs are finalized to the custom domain
         in the deploy slice. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ludwig Chess" />
    <meta property="og:title" content="Ludwig Chess" />
    <meta
      property="og:description"
      content="Standard online chess with a live Stockfish evaluation bar that runs in your browser. Free, no signup, play a friend by sharing a code."
    />
    <meta property="og:url" content="https://ludwig-chess.fly.dev/" />
    <meta property="og:image" content="https://ludwig-chess.fly.dev/og.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta
      property="og:image:alt"
      content="Ludwig Chess, standard online chess with a live eval bar"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ludwig Chess" />
    <meta
      name="twitter:description"
      content="Standard online chess with a live Stockfish evaluation bar that runs in your browser. Free, no signup, play a friend by sharing a code."
    />
    <meta name="twitter:image" content="https://ludwig-chess.fly.dev/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
